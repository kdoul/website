baseurl = "https://kdoul.me/"
languageCode = "en-us"
title = "kdoul.me"
theme = "terminal"
pagination.pagerSize = 5
enableRobotsTXT = true

[markup.goldmark.renderer]
  unsafe = true

[params]
  contentTypeName = "posts"
  showMenuItems = 4
  fullWidthTheme = false
  centerTheme = true
  showLanguageSelector = false
  showLastUpdated = false
  readingTime = true
  Toc = false

[languages]
  [languages.en]
    title = "kdoul.me"
    copyright = "Konstantinos"
    [languages.en.params]
      subtitle = "IoT cloud solution architect working across data pipelines and enterprise integration"
      taglineExtra = "building things in the cloud and in the basement"
      owner = "konstantinos"
      keywords = "iot, cloud architecture, devops, data platforms, homelab"
      menuMore = "Show more"
      readMore = "Read more"
      readOtherPosts = "Read other posts"
      missingContentMessage = "Page not found..."
      missingBackButtonLabel = "Back to home page"
      [languages.en.params.social]
        github = "https://github.com/kdoul"
        linkedin = "https://www.linkedin.com/in/konstantinos-douloudis/"
      [languages.en.params.logo]
        logoText = "kdoul.me"
        logoHomeLink = "/"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "about"
        name = "about"
        url = "/about"
        weight = 1
      [[languages.en.menu.main]]
        identifier = "projects"
        name = "projects"
        url = "/projects"
        weight = 2
      [[languages.en.menu.main]]
        identifier = "posts"
        name = "blog"
        url = "/posts"
        weight = 3
      [[languages.en.menu.main]]
        identifier = "contact"
        name = "contact"
        url = "/contact"
        weight = 4
